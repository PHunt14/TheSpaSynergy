name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create amplify_outputs stub for tests
        run: echo '{"auth":{"user_pool_id":"stub","aws_region":"us-east-1","user_pool_client_id":"stub","identity_pool_id":"stub","username_attributes":["email"],"standard_required_attributes":["email"],"user_verification_types":["email"],"unauthenticated_identities_enabled":true,"password_policy":{"min_length":8,"require_lowercase":true,"require_numbers":true,"require_symbols":true,"require_uppercase":true}},"data":{"url":"https://stub.appsync-api.us-east-1.amazonaws.com/graphql","aws_region":"us-east-1","api_key":"stub","default_authorization_type":"API_KEY","authorization_types":[]}}' > amplify_outputs.json

      - run: npm test

      - run: npm run typecheck

  test-payment-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/payment-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/payment-service/package-lock.json

      - run: npm ci

      - run: npm test

  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Snyk dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      - name: Snyk code scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high

