version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    postBuild:
      commands:
        - export SEND_EMAIL_FUNCTION_URL=$(aws cloudformation describe-stacks --stack-name amplify-${AWS_APP_ID}-${AWS_BRANCH} --query "Stacks[0].Outputs[?OutputKey=='SendEmailFunctionUrl'].OutputValue" --output text)
        - echo "SEND_EMAIL_FUNCTION_URL=$SEND_EMAIL_FUNCTION_URL" >> .env.production
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
